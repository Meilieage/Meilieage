name: Rule Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest

    steps:
      - name: 拉代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 执行规则清洗
        run: python scripts/normalize_rules.py

      - name: 提交修改
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          if git diff --quiet; then
            echo "No changes"
          else
            git commit -m "auto: normalize rules"
            git push
          fi
